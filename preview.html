<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>睿宝视频号热点筛选 - 预览</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fbfbf7; color: #18221d; }
      a { color: inherit; text-decoration: none; }
      button { font: inherit; }
      .wrap { width: min(100% - 40px, 1180px); margin: 0 auto; }
      header { position: sticky; top: 0; z-index: 5; border-bottom: 1px solid #e6ebe4; background: rgba(251,251,247,.94); backdrop-filter: blur(16px); }
      nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
      .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; }
      .logo { display: grid; place-items: center; width: 32px; height: 32px; border-radius: 6px; background: #176f5d; color: #fff; }
      .hero { padding: 56px 0 36px; }
      .eyebrow { color: #176f5d; font-size: 14px; font-weight: 650; }
      h1 { max-width: 760px; margin: 14px 0 0; font-size: clamp(38px, 6vw, 64px); line-height: 1.08; font-weight: 650; letter-spacing: 0; }
      .lead { max-width: 720px; color: #5f6c64; font-size: 17px; line-height: 1.8; }
      .workbench { display: grid; grid-template-columns: .9fr 1.1fr; gap: 20px; padding: 0 0 56px; }
      .panel { border: 1px solid #e1e8e2; border-radius: 10px; background: rgba(255,255,255,.86); padding: 20px; }
      .detail { position: sticky; top: 88px; align-self: start; background: #fff; }
      .panel-head { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
      .label { color: #8a978e; font-size: 12px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; }
      h2 { margin: 6px 0 0; font-size: 22px; font-weight: 650; }
      .count, .pill { border-radius: 6px; background: #eef6f1; color: #176f5d; padding: 5px 10px; font-size: 12px; font-weight: 700; }
      .sync { margin-top: 4px; color: #8a978e; font-size: 12px; }
      .news { display: grid; gap: 8px; }
      .item { width: 100%; border: 1px solid #edf1ec; border-radius: 9px; background: #fff; padding: 13px; text-align: left; cursor: pointer; transition: border-color .2s, background .2s; }
      .item:hover { border-color: #b7c8bd; background: #fbfdf9; }
      .item.active { border-color: #176f5d; background: #f2f8f4; }
      .meta { display: flex; justify-content: space-between; gap: 12px; color: #8a978e; font-size: 12px; margin-bottom: 6px; }
      .meta strong { color: #176f5d; }
      .item h3 { margin: 0; color: #243028; font-size: 14px; line-height: 1.7; }
      .score { margin: 6px 0 0; color: #8a978e; font-size: 12px; }
      .detail-title { margin: 14px 0 0; font-size: 26px; line-height: 1.38; }
      .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
      .box { border: 1px solid #edf1ec; border-radius: 9px; background: #fbfdf9; padding: 16px; }
      .box p, .summary p, .risk p { margin: 8px 0 0; color: #4f5e55; font-size: 14px; line-height: 1.75; }
      .source-button { display: inline-flex; margin-top: 12px; border-radius: 6px; background: #18221d; color: #fff; padding: 10px 13px; font-size: 14px; font-weight: 700; }
      .summary { margin-top: 12px; border: 1px solid #edf1ec; border-radius: 9px; padding: 16px; }
      .risk { margin-top: 12px; border: 1px solid #f1dfd0; border-radius: 9px; background: #fff9f4; padding: 16px; }
      .risk .label { color: #a6682d; }
      .risk p { color: #6f4c2d; }
      .disclaimer { margin: 14px 0 0; color: #8a978e; font-size: 12px; line-height: 1.7; }
      @media (max-width: 900px) { .workbench { grid-template-columns: 1fr; } .detail { position: static; } }
      @media (max-width: 560px) { .wrap { width: min(100% - 28px, 1180px); } h1 { font-size: 38px; } .detail-grid { grid-template-columns: 1fr; } .meta { align-items: flex-start; flex-direction: column; } }
    </style>
  </head>
  <body>
    <header><nav class="wrap"><a class="brand" href="./"><span class="logo">睿</span><span data-site-title>睿宝视频号热点筛选</span></a><a href="./">返回首页</a></nav></header>
    <main>
      <section class="wrap hero"><p class="eyebrow" data-subtitle></p><h1 data-title></h1><p class="lead" data-description></p></section>
      <section class="wrap workbench"><aside class="panel"><div class="panel-head"><div><div class="label">Candidates</div><h2>候选热点</h2><p class="sync" data-sync>加载中</p></div><span class="count" data-count>0 条</span></div><div class="news" data-hotspots></div></aside><section class="panel detail" data-detail></section></section>
    </main>
    <script>
      const fallbackData = { updatedAt: new Date().toISOString(), title: '睿宝视频号热点筛选', subtitle: '儿童健康内容热点筛选看板', description: '从儿科、益生菌、儿童保健和儿童健康相关热点中筛出适合视频号表达的选题。', hotspots: [], disclaimer: '健康内容仅用于选题筛选和科普策划，不替代医生诊断或治疗建议。发布前应核验权威来源。' };
      let currentData = fallbackData;
      let selectedIndex = 0;
      const escapeHtml = (value) => String(value || '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
      const formatUpdatedAt = (value) => { const date = new Date(value); return Number.isNaN(date.getTime()) ? '待更新' : date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); };
      function renderDetail(item) {
        if (!item) { document.querySelector('[data-detail]').innerHTML = '<h2>暂无热点</h2><p class="disclaimer">等待自动更新后展示。</p>'; return; }
        const source = item.sourceUrl ? '<a class="source-button" href="' + escapeHtml(item.sourceUrl) + '" target="_blank" rel="noreferrer">打开新闻原文 ↗</a>' : '<p>暂无原文链接，建议人工补充来源后再使用。</p>';
        document.querySelector('[data-detail]').innerHTML = '<div><span class="pill">' + escapeHtml(item.tag) + '</span><span class="sync">　' + escapeHtml(item.time) + (item.score ? ' · 选题分 ' + escapeHtml(item.score) : '') + '</span></div><h2 class="detail-title">' + escapeHtml(item.title) + '</h2><div class="detail-grid"><div class="box"><div class="label">来源核验</div><p><strong>' + escapeHtml(item.sourceName || '暂无来源名称') + '</strong></p>' + source + '</div><div class="box"><div class="label">视频号角度</div><p>' + escapeHtml(item.angle || '暂无推荐角度，可先从家长最关心的问题切入。') + '</p></div></div><div class="summary"><div class="label">原文摘要</div><p>' + escapeHtml(item.summary || '暂无摘要，建议打开来源核验。') + '</p></div><div class="risk"><div class="label">风险提示</div><p>' + escapeHtml(item.risk || '发布前需要核验权威来源，避免把科普内容表达成诊疗建议。') + '</p></div><p class="disclaimer">' + escapeHtml(currentData.disclaimer) + '</p>';
      }
      function render(data, live) {
        currentData = data;
        const hotspots = (data.hotspots || []).slice(0, 12);
        if (selectedIndex >= hotspots.length) selectedIndex = 0;
        document.title = data.title + ' - 预览';
        document.querySelector('[data-site-title]').textContent = data.title;
        document.querySelector('[data-title]').textContent = data.title;
        document.querySelector('[data-subtitle]').textContent = data.subtitle;
        document.querySelector('[data-description]').textContent = data.description;
        document.querySelector('[data-sync]').textContent = (live ? '已同步' : '本地预览') + ' · ' + formatUpdatedAt(data.updatedAt);
        document.querySelector('[data-count]').textContent = hotspots.length + ' 条';
        document.querySelector('[data-hotspots]').innerHTML = hotspots.map((item, index) => '<button class="item ' + (index === selectedIndex ? 'active' : '') + '" type="button" data-hotspot-index="' + index + '"><div class="meta"><strong>0' + (index + 1) + ' · ' + escapeHtml(item.tag) + '</strong><span>' + escapeHtml(item.time) + '</span></div><h3>' + escapeHtml(item.title) + '</h3>' + (item.score ? '<p class="score">选题分：' + escapeHtml(item.score) + '</p>' : '') + '</button>').join('');
        renderDetail(hotspots[selectedIndex]);
      }
      document.addEventListener('click', (event) => { const button = event.target.closest('[data-hotspot-index]'); if (!button) return; selectedIndex = Number(button.dataset.hotspotIndex || 0); render(currentData, true); });
      fetch('./hotspots.json', { cache: 'no-store' }).then((response) => response.ok ? response.json() : Promise.reject()).then((data) => render(data, true)).catch(() => render(fallbackData, false));
    </script>
  </body>
</html>
